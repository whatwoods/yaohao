<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公寓摇号系统</title>
    <meta name="description" content="公寓房间随机分配摇号系统">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎲%3C/text%3E%3C/svg%3E">
</head>

<body>
    <div class="app-container">
        <!-- 上传区域 -->
        <div id="upload-section" class="upload-section">
            <div class="upload-card card">
                <h1>公寓摇号系统</h1>
                <p class="upload-hint">上传包含员工信息的 Excel 文件，开始公平分配房间</p>
                <div id="drop-zone" class="drop-zone">
                    <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
                    <div class="drop-zone-content">
                        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p>拖拽文件到此处</p>
                        <span class="file-format-hint">支持 .xlsx、.xls 格式</span>
                    </div>
                </div>
                <button id="browse-btn" class="btn btn-primary">选择文件</button>
            </div>
        </div>

        <!-- 数据展示和摇号区域 -->
        <div id="lottery-section" class="lottery-section hidden">
            <div class="lottery-header card">
                <h2>摇号分配</h2>
                <div class="btn-group">
                    <button id="home-btn" class="btn btn-secondary hidden">返回首页</button>
                    <button id="export-excel-btn" class="btn btn-secondary hidden">导出 Excel</button>
                    <button id="export-pdf-btn" class="btn btn-secondary hidden">导出 PDF</button>
                    <button id="lottery-btn" class="btn btn-success">开始摇号</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">总人数</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">男生</div>
                    <div class="stat-value" id="stat-male">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">女生</div>
                    <div class="stat-value" id="stat-female">0</div>
                </div>
            </div>

            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th id="th-id-label">工号</th>
                            <th>性别</th>
                            <th>房间号</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 撒花画布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 依赖库（本地） -->
    <script src="js/lib/xlsx.min.js"></script>
    <script src="js/lib/confetti.min.js"></script>
    <script src="js/lib/jspdf.min.js"></script>
    <script src="js/lib/html2canvas.min.js"></script>

    <!-- 应用脚本 -->
    <script src="js/excel.js"></script>
    <script src="js/lottery.js"></script>
    <script src="js/app.js"></script>

    <!-- Vercel Speed Insights（仅在 Vercel 部署时加载，避免本地/其他平台 404） -->
    <script>
        if (window.location.hostname.includes('vercel.app')) {
            window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
            var s = document.createElement('script');
            s.defer = true;
            s.src = '/_vercel/speed-insights/script.js';
            document.body.appendChild(s);
        }
    </script>
</body>

</html>
